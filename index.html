<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>БПЛА: улучшенный DQN + ПИД‑стабилизатор</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js">
    </script>
    <style>
        body {
            font-family: sans-serif;
            background: #1a1a1a;
            color: #fff;
            margin: 20px;
        }
        #canvas-container {
            border: 2px solid #444;
            float: left;
            position: relative;
        }
        #controls {
            float: left;
            margin-left: 20px;
            background: #2a2a2a;
            padding: 15px;
            border-radius: 8px;
            width: 340px;
        }
        .btn {
            border: none;
            color: white;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 4px;
            font-weight: bold;
            width: 100%;
            margin-top: 8px;
        }
        .btn:hover { opacity: 0.9; }
        .stat { margin: 10px 0; font-size: 14px; }
        #wind-hud {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.6);
            padding: 5px 15px;
            border-radius: 15px;
            font-size: 14px;
            pointer-events: none;
            border: 1px solid #555;
        }
        .phase-indicator {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            background: #333;
            margin-left: 5px;
            font-size: 12px;
        }
        .small-btn {
            padding: 5px 10px;
            font-size: 12px;
            width: auto;
            margin: 4px 0;
        }
    </style>
</head>
<body>
<h2>БПЛА: улучшенный DQN + ПИД‑стабилизатор (8 действий, Double DQN, Adam)</h2>
<div id="canvas-container">
    <div id="wind-hud">Ветер: <span id="wind-text">0.00</span></div>
</div>
<div id="controls">
    <h3>Управление симуляцией</h3>
    <button class="btn" id="speed-btn" style="background:#e91e63;">Скорость: 4x</button>
    <button class="btn" id="wind-btn" style="background:#2196F3;">Ветер: Вкл</button>
    <div class="stat">Эпизод: <b id="episodes-count">0</b></div>
    <div class="stat">Шаг: <b id="steps-count">0</b></div>
    <div class="stat">Статус: <b id="drone-status" style="color:#ff9800">Поиск груза</b></div>
    <div class="stat">Награда: <b id="reward-val">0</b></div>
    <div class="stat">ε: <b id="epsilon-val">0.50</b></div>
    <div class="stat">Угол цели: <b id="target-angle-val">0.00</b> <span class="phase-indicator" id="angle-dir"></span></div>
    <div class="stat">Тяга: <b id="target-thrust-val">0.50</b></div>
    <hr style="border-color:#444">
    <button class="btn small-btn" id="save-btn" style="background:#607D8B;">Сохранить модель</button>
    <button class="btn small-btn" id="load-btn" style="background:#455A64;">Загрузить модель</button>
    <p style="font-size:12px;color:#aaa">Модель сохраняется в localStorage. Кнопки «Сохранить/Загрузить» позволяют продолжить обучение.</p>
</div>

<script>
    // ========== 1. Нейросеть с Adam ==========
    class NeuralNetwork {
        constructor(layers) {
            this.layers = layers;
            this.weights = [];
            this.biases = [];
            // Параметры Adam
            this.mWeights = [];
            this.vWeights = [];
            this.mBiases = [];
            this.vBiases = [];
            this.t = 0; // счётчик шагов обучения
            for (let i = 1; i < layers.length; i++) {
                const w = new Array(layers[i]);
                const mW = new Array(layers[i]);
                const vW = new Array(layers[i]);
                for (let j = 0; j < layers[i]; j++) {
                    w[j] = new Array(layers[i-1]);
                    mW[j] = new Array(layers[i-1]).fill(0);
                    vW[j] = new Array(layers[i-1]).fill(0);
                    for (let k = 0; k < layers[i-1]; k++) {
                        w[j][k] = (Math.random()*2 - 1) * Math.sqrt(2 / layers[i-1]);
                    }
                }
                this.weights.push(w);
                this.mWeights.push(mW);
                this.vWeights.push(vW);
                const b = new Array(layers[i]).fill(0);
                this.biases.push(b);
                this.mBiases.push(new Array(layers[i]).fill(0));
                this.vBiases.push(new Array(layers[i]).fill(0));
            }
            this.z = []; this.a = [];
        }

        forward(input) {
            this.z = []; this.a = [input];
            let current = input;
            for (let i = 0; i < this.weights.length; i++) {
                const W = this.weights[i], b = this.biases[i];
                const nextRaw = new Array(W.length);
                for (let j = 0; j < W.length; j++) {
                    let sum = b[j];
                    for (let k = 0; k < W[j].length; k++) sum += W[j][k] * current[k];
                    nextRaw[j] = sum;
                }
                this.z.push(nextRaw);
                const activated = new Array(nextRaw.length);
                if (i === this.weights.length - 1) {
                    for (let j = 0; j < nextRaw.length; j++) activated[j] = nextRaw[j];
                } else {
                    for (let j = 0; j < nextRaw.length; j++) activated[j] = Math.max(0, nextRaw[j]);
                }
                this.a.push(activated);
                current = activated;
            }
            return current;
        }

        // Обучение батча с Adam
        trainBatch(batch, learningRate) {
            const L = this.weights.length;
            const gradW = this.weights.map(W => W.map(row => row.map(() => 0)));
            const gradB = this.biases.map(b => b.map(() => 0));

            for (const sample of batch) {
                const { input, target } = sample;
                const output = this.forward(input);
                let delta = new Array(this.layers[L]).fill(0);
                for (let i = 0; i < output.length; i++) delta[i] = output[i] - target[i];

                for (let l = L-1; l >= 0; l--) {
                    const W = this.weights[l];
                    const aPrev = this.a[l];
                    const z = this.z[l];
                    if (l < L-1) {
                        for (let j = 0; j < delta.length; j++) delta[j] *= (z[j] > 0 ? 1 : 0);
                    }
                    for (let j = 0; j < W.length; j++) {
                        for (let k = 0; k < W[j].length; k++) {
                            gradW[l][j][k] += delta[j] * aPrev[k];
                        }
                        gradB[l][j] += delta[j];
                    }
                    if (l > 0) {
                        const prevDelta = new Array(W[0].length).fill(0);
                        for (let k = 0; k < W[0].length; k++) {
                            let sum = 0;
                            for (let j = 0; j < W.length; j++) sum += W[j][k] * delta[j];
                            prevDelta[k] = sum;
                        }
                        delta = prevDelta;
                    }
                }
            }

            const n = batch.length;
            this.t++;
            const beta1 = 0.9, beta2 = 0.999, eps = 1e-8;
            const lr = learningRate * Math.sqrt(1 - Math.pow(beta2, this.t)) / (1 - Math.pow(beta1, this.t));

            for (let l = 0; l < L; l++) {
                const W = this.weights[l], b = this.biases[l];
                const mW = this.mWeights[l], vW = this.vWeights[l];
                const mB = this.mBiases[l], vB = this.vBiases[l];
                for (let j = 0; j < W.length; j++) {
                    for (let k = 0; k < W[j].length; k++) {
                        const g = gradW[l][j][k] / n;
                        mW[j][k] = beta1 * mW[j][k] + (1 - beta1) * g;
                        vW[j][k] = beta2 * vW[j][k] + (1 - beta2) * g * g;
                        W[j][k] -= lr * mW[j][k] / (Math.sqrt(vW[j][k]) + eps);
                    }
                    const gb = gradB[l][j] / n;
                    mB[j] = beta1 * mB[j] + (1 - beta1) * gb;
                    vB[j] = beta2 * vB[j] + (1 - beta2) * gb * gb;
                    b[j] -= lr * mB[j] / (Math.sqrt(vB[j]) + eps);
                }
            }
        }
    }

    // ========== 2. DQN Агент (8 действий, Double DQN) ==========
    class DQNAgent {
        constructor(stateSize, actionSize, lr=0.001, gamma=0.99,
                    eps=0.5, epsMin=0.01, epsDecay=0.995) {
            this.stateSize = stateSize;
            this.actionSize = actionSize;
            this.gamma = gamma;
            this.epsilon = eps;
            this.epsilonMin = epsMin;
            this.epsilonDecay = epsDecay;
            this.learningRate = lr;

            this.model = new NeuralNetwork([stateSize, 128, 64, actionSize]);
            this.targetModel = new NeuralNetwork([stateSize, 128, 64, actionSize]);
            this.updateTargetModel();

            this.memory = [];
            this.batchSize = 64;
            this.memoryCapacity = 10000;
            this.stepsSinceTargetUpdate = 0;
            this.targetUpdateFreq = 300;
        }

        updateTargetModel() {
            for (let l = 0; l < this.model.weights.length; l++) {
                for (let j = 0; j < this.model.weights[l].length; j++) {
                    for (let k = 0; k < this.model.weights[l][j].length; k++) {
                        this.targetModel.weights[l][j][k] = this.model.weights[l][j][k];
                    }
                    this.targetModel.biases[l][j] = this.model.biases[l][j];
                }
            }
        }

        act(state) {
            if (Math.random() < this.epsilon) {
                return Math.floor(Math.random() * this.actionSize);
            }
            const q = this.model.forward(state);
            let maxIdx = 0;
            for (let i = 1; i < q.length; i++) if (q[i] > q[maxIdx]) maxIdx = i;
            return maxIdx;
        }

        remember(state, action, reward, nextState, done) {
            this.memory.push({ state, action, reward, nextState, done });
            if (this.memory.length > this.memoryCapacity) this.memory.shift();
        }

        replay() {
            if (this.memory.length < this.batchSize) return;

            const batch = [];
            const indices = new Set();
            while (indices.size < this.batchSize) {
                indices.add(Math.floor(Math.random() * this.memory.length));
            }
            for (const idx of indices) batch.push(this.memory[idx]);

            const batchSamples = [];
            for (const exp of batch) {
                const { state, action, reward, nextState, done } = exp;
                // Double DQN: выбираем действие по основной сети, оцениваем по целевой
                const qNextOnline = this.model.forward(nextState);
                const bestAction = qNextOnline.indexOf(Math.max(...qNextOnline));
                const qNextTarget = this.targetModel.forward(nextState);
                const qNextVal = done ? 0 : qNextTarget[bestAction];
                const targetQ = this.model.forward(state).slice();
                targetQ[action] = reward + this.gamma * qNextVal;
                batchSamples.push({ input: state, target: targetQ });
            }

            this.model.trainBatch(batchSamples, this.learningRate);

            this.stepsSinceTargetUpdate += this.batchSize;
            if (this.stepsSinceTargetUpdate >= this.targetUpdateFreq) {
                this.updateTargetModel();
                this.stepsSinceTargetUpdate = 0;
            }
        }

        // Методы для сохранения/загрузки весов
        getWeightsData() {
            return {
                weights: this.model.weights,
                biases: this.model.biases,
                mWeights: this.model.mWeights,
                vWeights: this.model.vWeights,
                mBiases: this.model.mBiases,
                vBiases: this.model.vBiases,
                t: this.model.t,
                epsilon: this.epsilon
            };
        }

        setWeightsData(data) {
            this.model.weights = data.weights;
            this.model.biases = data.biases;
            this.model.mWeights = data.mWeights;
            this.model.vWeights = data.vWeights;
            this.model.mBiases = data.mBiases;
            this.model.vBiases = data.vBiases;
            this.model.t = data.t || 0;
            this.epsilon = data.epsilon || this.epsilon;
            this.updateTargetModel();
        }
    }

    // ========== 3. Симуляция ==========
    const { Engine, Render, Bodies, Composite, Body, Constraint, Query } = Matter;
    const WIDTH = 800, HEIGHT = 500;
    let simSpeed = 4;
    let windEnabled = true;

    const engine = Engine.create({ gravity: { y: 1, scale: 0.003 } });
    const world = engine.world;

    const container = document.getElementById('canvas-container');
    const render = Render.create({
        element: container,
        engine: engine,
        options: { width: WIDTH, height: HEIGHT, wireframes: false, background: '#111' }
    });

    // Статические тела
    const ground = Bodies.rectangle(WIDTH/2, HEIGHT-10, WIDTH, 20, { isStatic: true, render: { fillStyle: '#333' } });
    const leftWall = Bodies.rectangle(10, HEIGHT/2, 20, HEIGHT, { isStatic: true });
    const rightWall = Bodies.rectangle(WIDTH-10, HEIGHT/2, 20, HEIGHT, { isStatic: true });
    const obstacle = Bodies.rectangle(400, 360, 40, 260, { isStatic: true, render: { fillStyle: '#d32f2f' } });

    // Дрон (сниженный angularDamping)
    const drone = Bodies.rectangle(100, 430, 60, 15, {
        density: 0.008,
        frictionAir: 0.08,
        render: { fillStyle: '#00e676', strokeStyle: '#000', lineWidth: 1 }
    });
    drone.angularDamping = 0.08;
    drone.angleErrorIntegral = 0; // интегральная ошибка ПИД

    // Груз
    let cargo = Bodies.rectangle(700, 450, 25, 25, {
        density: 0.006,
        render: { fillStyle: '#ff9100' }
    });
    const basePos = { x: 100, y: 450 };

    const hazardousBodies = [leftWall, rightWall, obstacle];
    const staticBodies = [ground, leftWall, rightWall, obstacle];
    const radarBodies = [obstacle];

    Composite.add(world, [ground, leftWall, rightWall, obstacle, drone, cargo]);

    let isCargoAttached = false;
    let cargoConstraint = null;
    let episodes = 0;
    let totalSteps = 0;
    let safeSteps = 0;
    const MAX_STEPS = 3000; // тайм-аут эпизода

    // ---------- Цели нижнего уровня (ПИД) ----------
    let targetAngle = 0.0;
    let targetThrust = 0.5;

    let windForceX = 0, windTime = 0;

    // Действия: 0 – удержание цели, 1 – сброс (LEVEL), 2/3 – слабый/сильный влево, 4/5 – слабый/сильный вправо, 6 – тяга вверх, 7 – тяга вниз
    const ACTION_HOLD = 0, ACTION_LEVEL = 1,
          ACTION_LEFT_SMALL = 2, ACTION_LEFT_LARGE = 3,
          ACTION_RIGHT_SMALL = 4, ACTION_RIGHT_LARGE = 5,
          ACTION_THRUST_UP = 6, ACTION_THRUST_DOWN = 7;
    const NUM_ACTIONS = 8;

    // Агент: 13 входов (добавлен центральный луч радара)
    const agent = new DQNAgent(13, NUM_ACTIONS, 0.001, 0.99, 0.5, 0.01, 0.995);

    // Визуализация радара
    let radarRays = []; // [{angle, endPoint, hit}]

    // Отрисовка дрона с индикатором цели
    function drawDroneMarker(ctx, body, targetAng) {
        const w = 60, h = 15, halfH = h/2;
        const pos = body.position, angle = body.angle;
        ctx.save();
        ctx.translate(pos.x, pos.y);
        ctx.rotate(angle);
        // Корпус
        ctx.fillStyle = '#00e676';
        ctx.fillRect(-w/2, -halfH, w, halfH);
        ctx.fillStyle = '#ff9100';
        ctx.fillRect(-w/2, 0, w, halfH);
        ctx.strokeStyle = '#000';
        ctx.lineWidth = 1;
        ctx.strokeRect(-w/2, -halfH, w, h);
        // Индикатор целевого угла (стрелка желаемого наклона)
        ctx.rotate(-angle); // возвращаемся в мировую систему
        ctx.beginPath();
        ctx.moveTo(0, 0);
        const arrowLen = 18;
        const tipX = Math.sin(targetAng) * arrowLen;
        const tipY = -Math.cos(targetAng) * arrowLen; // вверх
        ctx.lineTo(tipX, tipY);
        ctx.strokeStyle = '#ffeb3b';
        ctx.lineWidth = 2;
        ctx.stroke();
        // Маленький треугольник на конце
        ctx.beginPath();
        ctx.moveTo(tipX, tipY);
        ctx.lineTo(tipX - 4*Math.cos(targetAng) - 2*Math.sin(targetAng), tipY - 4*Math.sin(targetAng) + 2*Math.cos(targetAng));
        ctx.lineTo(tipX - 4*Math.cos(targetAng) + 2*Math.sin(targetAng), tipY - 4*Math.sin(targetAng) - 2*Math.cos(targetAng));
        ctx.closePath();
        ctx.fillStyle = '#ffeb3b';
        ctx.fill();
        ctx.restore();
    }

    function getRadarDistance(angleOffset, saveRay = false) {
        const maxRayLength = 250;
        const rayAngle = drone.angle + angleOffset;
        const endPoint = {
            x: drone.position.x + Math.sin(rayAngle) * maxRayLength,
            y: drone.position.y - Math.cos(rayAngle) * maxRayLength
        };
        const collisions = Query.ray(radarBodies, drone.position, endPoint);
        let hit = false, dist = 1.0, hitPoint = endPoint;
        if (collisions.length > 0 && collisions[0].point) {
            hitPoint = collisions[0].point;
            const dx = hitPoint.x - drone.position.x;
            const dy = hitPoint.y - drone.position.y;
            dist = Math.sqrt(dx*dx + dy*dy) / maxRayLength;
            hit = true;
        }
        if (saveRay) {
            radarRays.push({ angle: rayAngle, endPoint: hitPoint, hit });
        }
        return dist;
    }

    function updateWind() {
        if (!windEnabled) { windForceX = 0; return; }
        windTime += 0.01;
        windForceX = Math.sin(windTime) * 0.012 + Math.cos(windTime * 2.5) * 0.006;
        windForceX = Math.max(-0.02, Math.min(0.02, windForceX));
    }

    function applyDronePhysics(action) {
        // Сброс интегральной ошибки при резкой смене целевого угла
        const prevTargetAngle = targetAngle;
        // Верхний уровень: обновление целей
        switch(action) {
            case ACTION_HOLD:
                // Ничего не меняем
                break;
            case ACTION_LEVEL:
                targetAngle = 0.0;
                targetThrust = 0.5;
                drone.angleErrorIntegral = 0;
                break;
            case ACTION_LEFT_SMALL:
                targetAngle = -0.15;
                break;
            case ACTION_LEFT_LARGE:
                targetAngle = -0.35;
                break;
            case ACTION_RIGHT_SMALL:
                targetAngle = 0.15;
                break;
            case ACTION_RIGHT_LARGE:
                targetAngle = 0.35;
                break;
            case ACTION_THRUST_UP:
                targetThrust = Math.min(1.0, targetThrust + 0.08);
                break;
            case ACTION_THRUST_DOWN:
                targetThrust = Math.max(0.0, targetThrust - 0.08);
                break;
            default: break;
        }
        // Если целевой угол изменился (не HOLD и не LEVEL), сбрасываем интегратор
        if (action !== ACTION_HOLD && action !== ACTION_LEVEL && targetAngle !== prevTargetAngle) {
            drone.angleErrorIntegral = 0;
        }

        // Нижний уровень: ПИД-регулятор угла
        const dt = 1/60;
        const kP = 0.03, kI = 0.002, kD = 0.015;
        const error = targetAngle - drone.angle;
        drone.angleErrorIntegral += error * dt;
        // Ограничение интегральной составляющей
        const maxIntegral = 0.8 / kI; // примерно 400? лучше ограничить разумно
        if (drone.angleErrorIntegral > 0.5) drone.angleErrorIntegral = 0.5;
        if (drone.angleErrorIntegral < -0.5) drone.angleErrorIntegral = -0.5;
        const torque = kP * error + kI * drone.angleErrorIntegral - kD * drone.angularVelocity;
        drone.torque = torque;

        // Приложение тяги
        const thrustForce = targetThrust * 0.05;
        const upward = {
            x: Math.sin(drone.angle) * thrustForce,
            y: -Math.cos(drone.angle) * thrustForce
        };
        Body.applyForce(drone, drone.position, upward);

        // Ветер
        Body.applyForce(drone, drone.position, { x: windForceX, y: 0 });
        if (isCargoAttached) {
            Body.applyForce(cargo, cargo.position, { x: windForceX * 0.5, y: 0 });
        }
    }

    function getState() {
        const targetX = isCargoAttached ? basePos.x : cargo.position.x;
        const targetY = isCargoAttached ? basePos.y : cargo.position.y;
        const dx = targetX - drone.position.x;
        const dy = targetY - drone.position.y;
        // Очищаем массив лучей для визуализации
        radarRays = [];
        const radarLeft = getRadarDistance(-Math.PI/4, true);
        const radarCenter = getRadarDistance(0, true);
        const radarRight = getRadarDistance(Math.PI/4, true);
        return [
            drone.position.x / WIDTH,
            drone.position.y / HEIGHT,
            drone.velocity.x / 10,
            drone.velocity.y / 10,
            drone.angle / Math.PI,
            Math.tanh(drone.angularVelocity),
            dx / WIDTH,
            dy / HEIGHT,
            radarLeft,
            radarCenter,
            radarRight,
            targetAngle / Math.PI,
            targetThrust
        ];
    }

    function simulationStep() {
        totalSteps++;
        updateWind();

        const state = getState();
        const action = agent.act(state);
        applyDronePhysics(action);
        Engine.update(engine, 1000/60);

        const nextState = getState();
        const targetX = isCargoAttached ? basePos.x : cargo.position.x;
        const targetY = isCargoAttached ? basePos.y : cargo.position.y;
        const dx = targetX - drone.position.x;
        const dy = targetY - drone.position.y;
        const distAfter = Math.sqrt(dx*dx + dy*dy);

        const prevDist = Math.sqrt(
            Math.pow(targetX - (drone.position.x - drone.velocity.x * 0.016), 2) +
            Math.pow(targetY - (drone.position.y - drone.velocity.y * 0.016), 2)
        );
        let reward = (prevDist - distAfter) * 12;

        // Штраф за близость к препятствиям по радару
        if (nextState[8] < 0.25 || nextState[9] < 0.25 || nextState[10] < 0.25) reward -= 0.5;
        reward -= 0.01; // небольшой штраф за время

        let done = false;

        // Захват груза
        if (!isCargoAttached && distAfter < 45) {
            isCargoAttached = true;
            reward += 200;
            cargoConstraint = Constraint.create({
                bodyA: drone, bodyB: cargo,
                length: 45, stiffness: 0.7, damping: 0.1,
                render: { strokeStyle: '#ff9100', lineWidth: 3 }
            });
            Composite.add(world, cargoConstraint);
            document.getElementById('drone-status').innerText = "Возврат на базу";
            document.getElementById('drone-status').style.color = "#00e676";
        }

        // Доставка на базу
        if (isCargoAttached && distAfter < 55 && drone.position.x < 250) {
            reward += 500;
            done = true;
        }

        // Опасные ситуации
        const hitHazard = Query.collides(drone, hazardousBodies).length > 0;
        const outOfBounds = drone.position.y < 15 || drone.position.y > HEIGHT;
        const isUpsideDown = Math.abs(drone.angle) > Math.PI / 2;
        const isOnGround = Query.collides(drone, [ground]).length > 0;

        if (isUpsideDown && isOnGround) {
            reward = -200;
            done = true;
        } else if (hitHazard || outOfBounds) {
            reward = -150;
            done = true;
        } else if (totalSteps > MAX_STEPS) {
            reward -= 50;
            done = true;
        } else if (safeSteps < 20) {
            safeSteps++;
        } else {
            if (Math.abs(drone.angle) > Math.PI/1.8 && drone.angularVelocity * drone.angle > 0.1) {
                reward -= 1.0;
            }
        }

        agent.remember(state, action, reward, nextState, done);
        agent.replay();

        if (done) {
            resetScene();
        }

        // Обновление интерфейса каждые 5 шагов
        if (totalSteps % 5 === 0) {
            document.getElementById('steps-count').innerText = totalSteps;
            document.getElementById('reward-val').innerText = reward.toFixed(2);
            document.getElementById('epsilon-val').innerText = agent.epsilon.toFixed(3);
            document.getElementById('target-angle-val').innerText = (targetAngle * 180 / Math.PI).toFixed(1) + '°';
            document.getElementById('target-thrust-val').innerText = targetThrust.toFixed(2);
            const dirEl = document.getElementById('angle-dir');
            if (targetAngle < -0.02) { dirEl.innerText = '←'; dirEl.style.color = '#00bcd4'; }
            else if (targetAngle > 0.02) { dirEl.innerText = '→'; dirEl.style.color = '#ff5722'; }
            else { dirEl.innerText = '•'; dirEl.style.color = '#aaa'; }

            const windSpan = document.getElementById('wind-text');
            if (!windEnabled) {
                windSpan.innerHTML = "Выкл";
                windSpan.style.color = "#aaa";
            } else {
                const windDir = windForceX > 0 ? "→ Справа" : "← Слева";
                const windPower = Math.abs(windForceX * 1000).toFixed(1);
                windSpan.innerHTML = `${windDir} (${windPower} м/с)`;
                windSpan.style.color = windForceX > 0 ? "#00bcd4" : "#ff5722";
            }
        }
    }

    function resetScene() {
        episodes++;
        agent.epsilon = Math.max(agent.epsilonMin, agent.epsilon * agent.epsilonDecay);
        totalSteps = 0;
        safeSteps = 0;
        document.getElementById('episodes-count').innerText = episodes;
        document.getElementById('steps-count').innerText = totalSteps;

        if (cargoConstraint) {
            Composite.remove(world, cargoConstraint);
            cargoConstraint = null;
        }
        isCargoAttached = false;
        document.getElementById('drone-status').innerText = "Поиск груза";
        document.getElementById('drone-status').style.color = "#ff9800";

        targetAngle = 0.0;
        targetThrust = 0.5;
        drone.angleErrorIntegral = 0;

        Body.setPosition(drone, { x: 100, y: 430 });
        Body.setVelocity(drone, { x: 0, y: 0 });
        Body.setAngle(drone, 0);
        Body.setAngularVelocity(drone, 0);
        drone.torque = 0;

        Body.setPosition(cargo, { x: 700, y: 450 });
        Body.setVelocity(cargo, { x: 0, y: 0 });
        Body.setAngle(cargo, 0);
        Body.setAngularVelocity(cargo, 0);
    }

    function gameLoop() {
        for (let i = 0; i < simSpeed; i++) simulationStep();
        Render.world(render);
        const ctx = render.canvas.getContext('2d');
        // Рисуем лучи радара
        if (radarRays.length > 0) {
            ctx.save();
            radarRays.forEach(ray => {
                ctx.beginPath();
                ctx.moveTo(drone.position.x, drone.position.y);
                ctx.lineTo(ray.endPoint.x, ray.endPoint.y);
                ctx.strokeStyle = ray.hit ? 'rgba(255, 0, 0, 0.5)' : 'rgba(0, 255, 255, 0.3)';
                ctx.lineWidth = 1;
                ctx.stroke();
            });
            ctx.restore();
        }
        drawDroneMarker(ctx, drone, targetAngle);
        requestAnimationFrame(gameLoop);
    }

    // ========== Управление скоростью и ветром ==========
    document.getElementById('speed-btn').addEventListener('click', () => {
        simSpeed = simSpeed === 1 ? 4 : 1;
        const btn = document.getElementById('speed-btn');
        if (simSpeed === 4) {
            btn.innerText = 'Скорость: 4x';
            btn.style.background = '#e91e63';
        } else {
            btn.innerText = 'Скорость: 1x';
            btn.style.background = '#4caf50';
        }
    });

    document.getElementById('wind-btn').addEventListener('click', () => {
        windEnabled = !windEnabled;
        const btn = document.getElementById('wind-btn');
        if (windEnabled) {
            btn.innerText = 'Ветер: Вкл';
            btn.style.background = '#2196F3';
        } else {
            btn.innerText = 'Ветер: Выкл';
            btn.style.background = '#607D8B';
            windForceX = 0;
        }
    });

    // ========== Сохранение / загрузка модели ==========
    document.getElementById('save-btn').addEventListener('click', () => {
        const data = agent.getWeightsData();
        // Глубокая копия для сериализации (массивы)
        localStorage.setItem('drone_dqn_model', JSON.stringify(data));
        alert('Модель сохранена в localStorage.');
    });

    document.getElementById('load-btn').addEventListener('click', () => {
        const json = localStorage.getItem('drone_dqn_model');
        if (!json) {
            alert('Сохранённая модель не найдена.');
            return;
        }
        try {
            const data = JSON.parse(json);
            agent.setWeightsData(data);
            alert('Модель загружена.');
        } catch (e) {
            alert('Ошибка загрузки модели.');
        }
    });

    gameLoop();
</script>
</body>
</html>
