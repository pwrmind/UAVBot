<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>БПЛА: DQN (стабильная физика + ветер вкл/выкл) – исправленная версия</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js">
    </script>
    <style>
        body {
            font-family: sans-serif;
            background: #1a1a1a;
            color: #fff;
            margin: 20px;
        }

        #canvas-container {
            border: 2px solid #444;
            float: left;
            position: relative;
        }

        #controls {
            float: left;
            margin-left: 20px;
            background: #2a2a2a;
            padding: 15px;
            border-radius: 8px;
            width: 300px;
        }

        .btn {
            border: none;
            color: white;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 4px;
            font-weight: bold;
            width: 100%;
            margin-top: 8px;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .stat {
            margin: 10px 0;
            font-size: 14px;
        }

        #wind-hud {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.6);
            padding: 5px 15px;
            border-radius: 15px;
            font-size: 14px;
            pointer-events: none;
            border: 1px solid #555;
        }
    </style>
</head>
<body>
<h2>БПЛА: DQN (стабильная физика, скорость x1/x4) – исправленная версия</h2>
<div id="canvas-container">
    <div id="wind-hud">Ветер: <span id="wind-text">0.00</span></div>
</div>
<div id="controls">
    <h3>Управление</h3>
    <button class="btn" id="speed-btn" style="background:#e91e63;">Скорость: 4x (быстро)</button>
    <button class="btn" id="wind-btn" style="background:#2196F3;">Ветер: Вкл</button>
    <div class="stat">Эпоха: <b id="episodes-count">0</b></div>
    <div class="stat">Шаг: <b id="steps-count">0</b></div>
    <div class="stat">Статус: <b id="drone-status" style="color:#ff9800">Поиск груза</b></div>
    <div class="stat">Награда: <b id="reward-val">0</b></div>
    <div class="stat">ε: <b id="epsilon-val">0.50</b></div>
    <hr style="border-color:#444">
    <p style="font-size:12px;color:#aaa">Исправления: земля не убивает, ε-затухание раз в эпизод, угловое демпфирование, batch-градиенты,
        радар не видит пол.</p>
</div>

<script>
    // ========== 1. Нейросеть (с batch‑обучением) ==========
    class NeuralNetwork {
        constructor(layers) {
            this.layers = layers;
            this.weights = [];
            this.biases = [];
            for (let i = 1; i < layers.length; i++) {
                const w = new Array(layers[i]);
                for (let j = 0; j < layers[i]; j++) {
                    w[j] = new Array(layers[i - 1]);
                    for (let k = 0; k < layers[i - 1]; k++) {
                        w[j][k] = (Math.random() * 2 - 1) * Math.sqrt(2 / layers[i - 1]);
                    }
                }
                this.weights.push(w);
                this.biases.push(new Array(layers[i]).fill(0));
            }
            // для хранения промежуточных значений при forward
            this.z = [];
            this.a = [];
        }

        forward(input) {
            this.z = [];
            this.a = [input];
            let current = input;
            for (let i = 0; i < this.weights.length; i++) {
                const W = this.weights[i];
                const b = this.biases[i];
                const nextRaw = new Array(W.length);
                for (let j = 0; j < W.length; j++) {
                    let sum = b[j];
                    for (let k = 0; k < W[j].length; k++) sum += W[j][k] * current[k];
                    nextRaw[j] = sum;
                }
                this.z.push(nextRaw);
                const activated = new Array(nextRaw.length);
                if (i === this.weights.length - 1) {
                    // линейный выход
                    for (let j = 0; j < nextRaw.length; j++) activated[j] = nextRaw[j];
                } else {
                    // ReLU
                    for (let j = 0; j < nextRaw.length; j++) activated[j] = Math.max(0, nextRaw[j]);
                }
                this.a.push(activated);
                current = activated;
            }
            return current;
        }

        // Обучение на мини‑батче (стабильный градиент)
        trainBatch(batch, learningRate) {
            const L = this.weights.length;
            // Инициализируем аккумуляторы градиентов нулями
            const gradW = this.weights.map(W => W.map(row => row.map(() => 0)));
            const gradB = this.biases.map(b => b.map(() => 0));

            for (const sample of batch) {
                const { input, target } = sample;
                // прямой проход
                const output = this.forward(input);
                // ошибка выходного слоя
                let delta = new Array(this.layers[L]).fill(0);
                for (let i = 0; i < output.length; i++) {
                    delta[i] = output[i] - target[i];
                }
                // обратное распространение и накопление градиентов
                for (let l = L - 1; l >= 0; l--) {
                    const W = this.weights[l];
                    const aPrev = this.a[l];
                    const z = this.z[l];

                    // производная ReLU для скрытых слоёв
                    if (l < L - 1) {
                        for (let j = 0; j < delta.length; j++) {
                            delta[j] *= (z[j] > 0 ? 1 : 0);
                        }
                    }

                    for (let j = 0; j < W.length; j++) {
                        for (let k = 0; k < W[j].length; k++) {
                            gradW[l][j][k] += delta[j] * aPrev[k];
                        }
                        gradB[l][j] += delta[j];
                    }

                    // переход к предыдущему слою
                    if (l > 0) {
                        const prevDelta = new Array(W[0].length).fill(0);
                        for (let k = 0; k < W[0].length; k++) {
                            let sum = 0;
                            for (let j = 0; j < W.length; j++) {
                                sum += W[j][k] * delta[j];
                            }
                            prevDelta[k] = sum;
                        }
                        delta = prevDelta;
                    }
                }
            }

            // Усредняем и применяем градиенты
            const n = batch.length;
            for (let l = 0; l < L; l++) {
                const W = this.weights[l];
                const b = this.biases[l];
                for (let j = 0; j < W.length; j++) {
                    for (let k = 0; k < W[j].length; k++) {
                        W[j][k] -= learningRate * gradW[l][j][k] / n;
                    }
                    b[j] -= learningRate * gradB[l][j] / n;
                }
            }
        }
    }

    // ========== 2. DQN Агент ==========
    class DQNAgent {
        constructor(stateSize, actionSize, lr = 0.002, gamma = 0.99,
                    eps = 0.5, epsMin = 0.02, epsDecay = 0.995) {
            this.stateSize = stateSize;
            this.actionSize = actionSize;
            this.gamma = gamma;
            this.epsilon = eps;
            this.epsilonMin = epsMin;
            this.epsilonDecay = epsDecay;
            this.learningRate = lr;

            this.model = new NeuralNetwork([stateSize, 128, 64, actionSize]);
            this.targetModel = new NeuralNetwork([stateSize, 128, 64, actionSize]);
            this.updateTargetModel();

            this.memory = [];
            this.batchSize = 64;
            this.memoryCapacity = 5000;
            this.stepsSinceTargetUpdate = 0;
            this.targetUpdateFreq = 200;
        }

        updateTargetModel() {
            for (let l = 0; l < this.model.weights.length; l++) {
                for (let j = 0; j < this.model.weights[l].length; j++) {
                    for (let k = 0; k < this.model.weights[l][j].length; k++) {
                        this.targetModel.weights[l][j][k] = this.model.weights[l][j][k];
                    }
                    this.targetModel.biases[l][j] = this.model.biases[l][j];
                }
            }
        }

        act(state) {
            if (Math.random() < this.epsilon) {
                return Math.floor(Math.random() * this.actionSize);
            }
            const q = this.model.forward(state);
            let maxIdx = 0;
            for (let i = 1; i < q.length; i++) if (q[i] > q[maxIdx]) maxIdx = i;
            return maxIdx;
        }

        remember(state, action, reward, nextState, done) {
            this.memory.push({ state, action, reward, nextState, done });
            if (this.memory.length > this.memoryCapacity) this.memory.shift();
        }

        replay() {
            if (this.memory.length < this.batchSize) return;

            // ε‑затухание теперь происходит только в конце эпизода (в resetScene)
            const batch = [];
            const indices = new Set();
            while (indices.size < this.batchSize) {
                indices.add(Math.floor(Math.random() * this.memory.length));
            }
            for (const idx of indices) batch.push(this.memory[idx]);

            const batchSamples = [];
            for (const exp of batch) {
                const { state, action, reward, nextState, done } = exp;
                const qNext = this.targetModel.forward(nextState);
                const targetQ = this.model.forward(state).slice();
                if (done) {
                    targetQ[action] = reward;
                } else {
                    targetQ[action] = reward + this.gamma * Math.max(...qNext);
                }
                batchSamples.push({ input: state, target: targetQ });
            }

            // Одно стабильное обновление по всему батчу
            this.model.trainBatch(batchSamples, this.learningRate);

            this.stepsSinceTargetUpdate += this.batchSize;
            if (this.stepsSinceTargetUpdate >= this.targetUpdateFreq) {
                this.updateTargetModel();
                this.stepsSinceTargetUpdate = 0;
            }
        }
    }

    // ========== 3. Симуляция ==========
    const { Engine, Render, Bodies, Composite, Body, Constraint, Query } = Matter;
    const WIDTH = 800, HEIGHT = 500;
    let simSpeed = 4;           // макс. 4x (стабильно)
    let windEnabled = true;

    // Увеличена гравитация для более быстрой динамики
    const engine = Engine.create({ gravity: { y: 1, scale: 0.003 } });
    const world = engine.world;

    const container = document.getElementById('canvas-container');
    const render = Render.create({
        element: container,
        engine: engine,
        options: { width: WIDTH, height: HEIGHT, wireframes: false, background: '#111' }
    });

    // Статические тела окружения
    const ground = Bodies.rectangle(WIDTH / 2, HEIGHT - 10, WIDTH, 20, { isStatic: true, render: { fillStyle: '#333' } });
    const leftWall = Bodies.rectangle(10, HEIGHT / 2, 20, HEIGHT, { isStatic: true });
    const rightWall = Bodies.rectangle(WIDTH - 10, HEIGHT / 2, 20, HEIGHT, { isStatic: true });
    const obstacle = Bodies.rectangle(400, 360, 40, 260, { isStatic: true, render: { fillStyle: '#d32f2f' } });

    // Дрон
const drone = Bodies.rectangle(100, 430, 60, 15, {
    density: 0.008,
    frictionAir: 0.1,
    render: { fillStyle: '#00e676' }
});
// Устанавливаем угловое демпфирование (вместо несуществующего setAngularDamping)
drone.angularDamping = 0.12;

    // Груз
    let cargo = Bodies.rectangle(700, 450, 25, 25, {
        density: 0.006,
        render: { fillStyle: '#ff9100' }
    });
    const basePos = { x: 100, y: 450 };

    // Массивы для проверки столкновений
    // Опасные тела (столкновение с ними = конец эпизода) – земля исключена!
    const hazardousBodies = [leftWall, rightWall, obstacle];
    // Все статические тела для физики (рендер и коллизии)
    const staticBodies = [ground, leftWall, rightWall, obstacle];
    // Тела, которые видит радар (только препятствие, земля не нужна)
    const radarBodies = [obstacle];

    Composite.add(world, [ground, leftWall, rightWall, obstacle, drone, cargo]);

    let isCargoAttached = false;
    let cargoConstraint = null;
    let episodes = 0;
    let totalSteps = 0;
    let safeSteps = 0;          // счётчик "безопасных" шагов в начале эпизода

    let windForceX = 0, windTime = 0;

    const agent = new DQNAgent(10, 4, 0.002, 0.99, 0.5, 0.02, 0.995);

    // Радар: расстояние до препятствия (нормированное)
    function getRadarDistance(angleOffset) {
        const maxRayLength = 250;
        const rayAngle = drone.angle + angleOffset;
        const endPoint = {
            x: drone.position.x + Math.sin(rayAngle) * maxRayLength,
            y: drone.position.y - Math.cos(rayAngle) * maxRayLength
        };
        const collisions = Query.ray(radarBodies, drone.position, endPoint);
        if (collisions.length > 0 && collisions[0].point) {
            const hitPoint = collisions[0].point;
            const dx = hitPoint.x - drone.position.x;
            const dy = hitPoint.y - drone.position.y;
            return Math.sqrt(dx * dx + dy * dy) / maxRayLength;
        }
        return 1.0;
    }

    function updateWind() {
        if (!windEnabled) {
            windForceX = 0;
            return;
        }
        windTime += 0.01;
        windForceX = Math.sin(windTime) * 0.012 + Math.cos(windTime * 2.5) * 0.006;
        if (windForceX > 0.02) windForceX = 0.02;
        if (windForceX < -0.02) windForceX = -0.02;
    }

    function applyDronePhysics(action) {
        const force = 0.045;   // чуть уменьшена сила для стабильности
        const angle = drone.angle;
        const forceVector = { x: Math.sin(angle) * force, y: -Math.cos(angle) * force };
        if (action === 1 || action === 3) {
            const leftPoint = {
                x: drone.position.x - Math.cos(angle) * 25,
                y: drone.position.y - Math.sin(angle) * 25
            };
            Body.applyForce(drone, leftPoint, forceVector);
        }
        if (action === 2 || action === 3) {
            const rightPoint = {
                x: drone.position.x + Math.cos(angle) * 25,
                y: drone.position.y + Math.sin(angle) * 25
            };
            Body.applyForce(drone, rightPoint, forceVector);
        }
        Body.applyForce(drone, drone.position, { x: windForceX, y: 0 });
        if (isCargoAttached) {
            Body.applyForce(cargo, cargo.position, { x: windForceX * 0.5, y: 0 });
        }
    }

    function getState() {
        const targetX = isCargoAttached ? basePos.x : cargo.position.x;
        const targetY = isCargoAttached ? basePos.y : cargo.position.y;
        const dx = targetX - drone.position.x;
        const dy = targetY - drone.position.y;
        const radarLeft = getRadarDistance(-Math.PI / 4);
        const radarRight = getRadarDistance(Math.PI / 4);
        return [
            drone.position.x / WIDTH,
            drone.position.y / HEIGHT,
            drone.velocity.x / 10,
            drone.velocity.y / 10,
            drone.angle / Math.PI,
            Math.tanh(drone.angularVelocity),
            dx / WIDTH,
            dy / HEIGHT,
            radarLeft,
            radarRight
        ];
    }

    function simulationStep() {
        totalSteps++;
        updateWind();
        const state = getState();
        const action = agent.act(state);
        applyDronePhysics(action);
        Engine.update(engine, 1000 / 60);

        const nextState = getState();
        const targetX = isCargoAttached ? basePos.x : cargo.position.x;
        const targetY = isCargoAttached ? basePos.y : cargo.position.y;
        const dx = targetX - drone.position.x;
        const dy = targetY - drone.position.y;
        const distAfter = Math.sqrt(dx * dx + dy * dy);

        // Предыдущее расстояние (приблизительно)
        const prevDist = Math.sqrt(
            Math.pow(targetX - (drone.position.x - drone.velocity.x * 0.016), 2) +
            Math.pow(targetY - (drone.position.y - drone.velocity.y * 0.016), 2)
        );
        let reward = (prevDist - distAfter) * 12;

        // Небольшой штраф за близость к препятствию (по радару)
        if (nextState[8] < 0.25 || nextState[9] < 0.25) reward -= 0.5;
        reward -= 0.02; // временной штраф

        let done = false;

        // Захват груза
        if (!isCargoAttached && distAfter < 45) {
            isCargoAttached = true;
            reward += 150;
            cargoConstraint = Constraint.create({
                bodyA: drone,
                bodyB: cargo,
                length: 45,
                stiffness: 0.7,
                damping: 0.1,
                render: { strokeStyle: '#ff9100', lineWidth: 3 }
            });
            Composite.add(world, cargoConstraint);
            document.getElementById('drone-status').innerText = "Возврат на базу";
            document.getElementById('drone-status').style.color = "#00e676";
        }

        // Доставка на базу
        if (isCargoAttached && distAfter < 55 && drone.position.x < 250) {
            reward += 500;
            done = true;
        }

        // Опасные ситуации: столкновение со стенами или препятствием, либо выход за вертикальные границы
        const hitHazard = Query.collides(drone, hazardousBodies).length > 0;
        const outOfBounds = drone.position.y < 15 || drone.position.y > HEIGHT;

        if (hitHazard || outOfBounds) {
            reward = -150;
            done = true;
        } else if (safeSteps < 20) {
            // В первые 20 шагов нового эпизода не штрафуем сильно за перевороты
            safeSteps++;
        } else {
            const isUpsideDown = Math.abs(drone.angle) > Math.PI / 1.6;
            if (isUpsideDown && drone.angularVelocity * drone.angle > 0.1) {
                reward -= 1.0;
            }
        }

        agent.remember(state, action, reward, nextState, done);
        agent.replay();

        if (done) {
            resetScene();
        }

        if (totalSteps % 10 === 0) {
            document.getElementById('steps-count').innerText = totalSteps;
            document.getElementById('reward-val').innerText = reward.toFixed(2);
            document.getElementById('epsilon-val').innerText = agent.epsilon.toFixed(3);
            const windSpan = document.getElementById('wind-text');
            if (!windEnabled) {
                windSpan.innerHTML = "Выкл";
                windSpan.style.color = "#aaa";
            } else {
                const windDir = windForceX > 0 ? "→ Справа" : "← Слева";
                const windPower = Math.abs(windForceX * 1000).toFixed(1);
                windSpan.innerHTML = `${windDir} (${windPower} м/с)`;
                windSpan.style.color = windForceX > 0 ? "#00bcd4" : "#ff5722";
            }
        }
    }

    function resetScene() {
        episodes++;
        // ε-затухание раз в эпизод, а не на каждом шаге
        agent.epsilon = Math.max(agent.epsilonMin, agent.epsilon * agent.epsilonDecay);

        totalSteps = 0;
        safeSteps = 0;
        document.getElementById('episodes-count').innerText = episodes;
        document.getElementById('steps-count').innerText = totalSteps;
        if (cargoConstraint) {
            Composite.remove(world, cargoConstraint);
            cargoConstraint = null;
        }
        isCargoAttached = false;
        document.getElementById('drone-status').innerText = "Поиск груза";
        document.getElementById('drone-status').style.color = "#ff9800";

        Body.setPosition(drone, { x: 100, y: 430 });
        Body.setVelocity(drone, { x: 0, y: 0 });
        Body.setAngle(drone, 0);
        Body.setAngularVelocity(drone, 0);

        Body.setPosition(cargo, { x: 700, y: 450 });
        Body.setVelocity(cargo, { x: 0, y: 0 });
        Body.setAngle(cargo, 0);
        Body.setAngularVelocity(cargo, 0);
    }

    function gameLoop() {
        for (let i = 0; i < simSpeed; i++) simulationStep();
        Render.world(render);
        requestAnimationFrame(gameLoop);
    }

    // Кнопка скорости: 1x / 4x
    document.getElementById('speed-btn').addEventListener('click', () => {
        simSpeed = simSpeed === 1 ? 4 : 1;
        const btn = document.getElementById('speed-btn');
        if (simSpeed === 4) {
            btn.innerText = 'Скорость: 4x (быстро)';
            btn.style.background = '#e91e63';
        } else {
            btn.innerText = 'Скорость: 1x (обычно)';
            btn.style.background = '#4caf50';
        }
    });

    // Ветер вкл/выкл
    document.getElementById('wind-btn').addEventListener('click', () => {
        windEnabled = !windEnabled;
        const btn = document.getElementById('wind-btn');
        if (windEnabled) {
            btn.innerText = 'Ветер: Вкл';
            btn.style.background = '#2196F3';
        } else {
            btn.innerText = 'Ветер: Выкл';
            btn.style.background = '#607D8B';
            windForceX = 0;
        }
    });

    gameLoop();
</script>
</body>
</html>
